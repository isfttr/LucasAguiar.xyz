name: Auto Suggest Backlinks

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    paths:
      - 'content/**/*.md'
      - 'scripts/suggest-backlinks.js'

jobs:
  backlinks:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run Backlinks Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run suggest-backlinks

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add content/ scripts/posts-index.json

          if git diff --staged --quiet; then
            echo "No backlink changes to commit."
          else
            git commit -m "chore(seo): auto-update backlinks"
            git push
            echo "Backlinks committed and pushed successfully!"
          fi
