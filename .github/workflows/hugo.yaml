# Sample workflow for building and deploying a Hugo site to GitHub Pages
name: Deploy Hugo site to Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # Runs on pushes targeting the default branch
  push:
    branches:
      - master

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  # Rebuild daily so the popularity ranking / "most read" data refreshes even when
  # no new content is pushed (view counts change continuously).
  schedule:
    - cron: '0 6 * * *'

  # Runs after the auto-translation (last step of the content chain) finishes.
  # Bot commits made with GITHUB_TOKEN do not trigger the push event above, so
  # without this the translated/backlinked content is never deployed.
  workflow_run:
    workflows: ["Auto Translate Content"]
    types: [completed]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    # When chained from Auto Translate Content, only build if that run succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    env:
      HUGO_VERSION: 0.160.1
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb          

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          # Always build the current tip of master. On workflow_run events the
          # default checkout SHA is the commit that triggered the translation,
          # i.e. before the translated file was committed.
          ref: master
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'
      - name: Install Dart Sass
        run: npm install -g sass
      - name: Install Node.js dependencies
        if: ${{ github.event_name == 'push' || github.event_name == 'workflow_run' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        run: |
          if [[ -f package-lock.json || -f npm-shrinkwrap.json ]]; then
            npm ci
          fi
      - name: Fetch PostHog view counts
        # Best-effort: writes data/post_views.json for the popularity ranking.
        # A PostHog failure must never break the deploy (the script also exits 0
        # on error and writes an empty file → Hugo falls back to chronological).
        continue-on-error: true
        env:
          POSTHOG_QUERY_API_KEY: ${{ secrets.POSTHOG_QUERY_API_KEY }}
          POSTHOG_PROJECT_ID: '404499'
          POSTHOG_API_HOST: 'https://us.posthog.com'
          VIEWS_WINDOW_DAYS: '0'
        run: npm run fetch-post-views
      - name: Build with Hugo
        env:
          # For maximum backward compatibility with Hugo modules
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"          
      - name: Verify public directory exists
        run: |
          if [ ! -d "public" ]; then
            echo "Error: public directory not found!"
            exit 1
          fi
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
