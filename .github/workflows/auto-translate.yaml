name: Auto Translate Content

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_run:
    workflows: ["Auto Suggest Backlinks"]
    types: [completed]
  push:
    paths:
      - 'scripts/translate.js'

jobs:
  translate:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' }}
    permissions:
      contents: write
    
    # Prevents concurrent runs from overwriting each other's commits
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch all history so the script can compare properly
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci || npm install
        
      - name: Run Translation Script
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run translate
        
      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add content/
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No new translations generated."
          else
            git commit -m "chore(i18n): auto-translate missing content"
            git pull --rebase origin master
            git push
            echo "Translations committed and pushed successfully!"
          fi
