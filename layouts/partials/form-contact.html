{{ if eq .Site.Language.Lang "pt" }}
<form id="contact-form">
  <div class="form-row">
    <label for="fc-name">Seu nome</label>
    <input type="text" id="fc-name" name="name" required placeholder="Lucas Silva">
  </div>
  <div class="form-row">
    <label for="fc-email">Seu e-mail</label>
    <input type="email" id="fc-email" name="email" required placeholder="voce@dominio.com">
  </div>
  <div class="form-row">
    <label for="fc-subject">Assunto</label>
    <select id="fc-subject" name="subject">
      <option>Consultoria em PI</option>
      <option>Redação de patentes</option>
      <option>Colaboração em pesquisa</option>
      <option>Palestras / aulas</option>
      <option>Só para dizer oi</option>
    </select>
  </div>
  <div class="form-row">
    <label for="fc-message">Sua mensagem</label>
    <textarea id="fc-message" name="message" required placeholder="Seja breve se puder — eu leio tudo."></textarea>
  </div>
  <!-- Honeypot anti-spam: invisível para humanos, bots costumam preencher -->
  <input type="text" name="website" tabindex="-1" autocomplete="off" aria-hidden="true"
    style="position:absolute;left:-9999px;opacity:0">
  <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px">
    Enviar mensagem →
  </button>
</form>
{{ else }}
<form id="contact-form">
  <div class="form-row">
    <label for="fc-name">Your name</label>
    <input type="text" id="fc-name" name="name" required placeholder="Lucas Silva">
  </div>
  <div class="form-row">
    <label for="fc-email">Your email</label>
    <input type="email" id="fc-email" name="email" required placeholder="you@domain.com">
  </div>
  <div class="form-row">
    <label for="fc-subject">About</label>
    <select id="fc-subject" name="subject">
      <option>IP consulting</option>
      <option>Patent drafting</option>
      <option>Research collaboration</option>
      <option>Speaking / teaching</option>
      <option>Just saying hi</option>
    </select>
  </div>
  <div class="form-row">
    <label for="fc-message">Your message</label>
    <textarea id="fc-message" name="message" required
      placeholder="Keep it short if you can — I read everything."></textarea>
  </div>
  <!-- Honeypot anti-spam: invisível para humanos, bots costumam preencher -->
  <input type="text" name="website" tabindex="-1" autocomplete="off" aria-hidden="true"
    style="position:absolute;left:-9999px;opacity:0">
  <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px">
    Send message →
  </button>
</form>
{{ end }}

<div id="contact-form-status" class="contact-form-status" role="status" aria-live="polite"></div>

<script>
  (function () {
    var form = document.getElementById('contact-form');
    if (!form) return;
    var endpoint = {{ .Site.Params.contactEndpoint }};
    var isPT = {{ if eq .Site.Language.Lang "pt" }}true{{ else }}false{{ end }};
    var statusEl = document.getElementById('contact-form-status');

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      var btn = form.querySelector('button[type="submit"]');
      var email = document.getElementById('fc-email').value;

      // Analytics (mantém o que já existe)
      if (typeof posthog !== 'undefined') {
        posthog.identify(email);
        posthog.capture('contact_form_submitted');
      }

      if (!endpoint) { return; }

      var original = btn.textContent;
      btn.disabled = true;
      btn.textContent = isPT ? 'Enviando…' : 'Sending…';

      fetch(endpoint, { method: 'POST', mode: 'no-cors', body: new FormData(form) })
        .then(function () {
          form.reset();
          form.style.display = 'none';
          if (statusEl) {
            statusEl.className = 'contact-form-status contact-form-success show';
            statusEl.textContent = isPT
              ? '✓ Mensagem enviada · responderei em breve'
              : '✓ Message sent · I\'ll reply soon';
          }
        })
        .catch(function () {
          btn.disabled = false;
          btn.textContent = original;
          if (statusEl) {
            statusEl.className = 'contact-form-status contact-form-error show';
            statusEl.textContent = isPT
              ? 'Erro ao enviar. Tente novamente.'
              : 'Something went wrong. Please try again.';
          }
        });
    });
  })();
</script>
