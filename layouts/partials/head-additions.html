<script type="text/javascript" src="/js/social-buttons.js" defer></script>
<script type="text/javascript" src="/js/repo-version.js" defer></script>

<meta property="og:site_name" content="{{ .Site.Title }}">
<meta property="og:locale" content="{{ .Site.LanguageCode | default "en_US" }}">

{{ $img := "" }}
{{ with .Params.featured_image }}{{ $img = . }}{{ end }}
{{ if not $img }}{{ with index .Params.images 0 }}{{ $img = . }}{{ end }}{{ end }}
{{ with $img }}
<meta property="og:image" content="{{ if strings.HasPrefix . "http" }}{{ . }}{{ else }}{{ $.Site.BaseURL }}{{ strings.TrimPrefix "/" . }}{{ end }}">
<meta name="twitter:image" content="{{ if strings.HasPrefix . "http" }}{{ . }}{{ else }}{{ $.Site.BaseURL }}{{ strings.TrimPrefix "/" . }}{{ end }}">
<meta name="twitter:card" content="summary_large_image">
{{ else }}
<meta name="twitter:card" content="summary">
{{ end }}
