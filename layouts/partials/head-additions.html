<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">



<script type="text/javascript" src="/js/social-buttons.js"></script>
<script type="text/javascript" src="/js/repo-version.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
  integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg=="
  crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="/assets/ananke/css/_social-icons.css">

<meta property="og:site_name" content="{{ .Site.Title }}">
<meta property="og:locale" content="{{ .Site.LanguageCode | default "en_US" }}">

{{ $img := "" }}
{{ with .Params.featured_image }}{{ $img = . }}{{ end }}
{{ if not $img }}{{ with index .Params.images 0 }}{{ $img = . }}{{ end }}{{ end }}
{{ with $img }}
<meta property="og:image" content="{{ if strings.HasPrefix . "http" }}{{ . }}{{ else }}{{ $.Site.BaseURL }}{{ strings.TrimPrefix "/" . }}{{ end }}">
<meta name="twitter:image" content="{{ if strings.HasPrefix . "http" }}{{ . }}{{ else }}{{ $.Site.BaseURL }}{{ strings.TrimPrefix "/" . }}{{ end }}">
<meta name="twitter:card" content="summary_large_image">
{{ else }}
<meta name="twitter:card" content="summary">
{{ end }}
