{{ $posthogToken := getenv "HUGO_POSTHOG_TOKEN" }}
{{ if $posthogToken }}
<!-- PostHog -->
<script>
    (function() {
        var getDistinctId = function() {
            var distinctId = localStorage.getItem('ph_distinct_id');
            if (!distinctId) {
                distinctId = 'user_' + Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
                localStorage.setItem('ph_distinct_id', distinctId);
            }
            return distinctId;
        };

        var payload = {
            api_key: '{{ $posthogToken }}',
            event: '$pageview',
            properties: {
                distinct_id: getDistinctId(),
                $current_url: window.location.href,
                $host: window.location.host,
                $pathname: window.location.pathname,
                $process_person_profile: false
            }
        };

        fetch('https://us.i.posthog.com/capture/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        }).catch(function(err) {
            console.error('Error sending PostHog event:', err);
        });
    })();
</script>
{{ end }}

{{ if and .IsHome (eq .Language.Lang "en") }}
<script>
  (function() {
    var prefLang = localStorage.getItem('pref_lang');
    if (prefLang === 'pt') {
      window.location.replace('/pt/');
      return;
    }
    if (!prefLang) {
      var userLang = navigator.language || navigator.userLanguage;
      if (userLang && userLang.toLowerCase().startsWith('pt')) {
        window.location.replace('/pt/');
      }
    }
  })();
</script>
{{ end }}
